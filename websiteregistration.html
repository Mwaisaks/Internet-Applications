<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Registration Form</title>
</head>
<body>
    <h1>Register Your Website.</h1>

    <form action="">

        <label for="name">First Name:</label><br>
        <input type="text" id="firstname" name="firstname" autocomplete="on"><br><br>

        <label for="name">Last Name:</label><br>
        <input type="text" id="lastname" name="lastname" autocomplete="on"><br><br>

        <label for="email">Email Address:</label><br>
        <input type="email" name="email" id="email" autocomplete="on"><br><br>

        <details>
            <summary>Click to add more information</summary>
            <label for="year">College Year:</label><br>
                <select id="year" name="year">
                <option>Freshman</option>
                <option>Sophomore</option>
                <option>Junior</option>
                <option>Senior</option>
                </select>
        </details><br>

        <input type="submit" value="Submit">
    </form>
    
</body>
</html>
